# Render Blueprint - Infrastructure as Code
# Deploy: Connect repo to Render, it auto-detects this file.
# Docs: https://render.com/docs/blueprint-spec

services:
  # Web Service - Django application
  - type: web
    name: myproject
    runtime: python
    buildCommand: ./build.sh
    startCommand: uvicorn config.asgi:application --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false  # Set manually in dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: myproject-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: myproject-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: myproject-redis
          type: redis
          property: connectionString
      - key: SITE_URL
        sync: false

  # Background Worker - Celery for async tasks
  - type: worker
    name: myproject-worker
    runtime: python
    buildCommand: ./build.sh
    startCommand: celery -A config worker -l info --pool=solo
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        fromService:
          name: myproject
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: myproject-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: myproject-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: myproject-redis
          type: redis
          property: connectionString

  # Redis - Celery broker and result backend
  - type: redis
    name: myproject-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: myproject-db
    plan: free
